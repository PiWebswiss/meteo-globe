services:
  meteo-globe:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    restart: unless-stopped
    volumes:
      # Live-reload the public/ folder without rebuilding the image
      - ./public:/app/public:ro
      # Persistent disk cache for satellite/label tiles (avoids re-fetching from Esri)
      - sat-tiles:/app/tile_cache

volumes:
  sat-tiles:
