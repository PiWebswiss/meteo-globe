<!DOCTYPE html>
<!-- MeteoGlobe UI shell. All logic lives in app.js; this file only declares
     the DOM structure that JS queries by id. i18n strings are resolved at
     runtime from the data-i18n / data-i18n-placeholder attributes. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeteoGlobe - Live Weather</title>
  <!-- Inter font, weights 300-800 (matches the bolds used by the canvas markers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- ?v= is a cache-buster bumped whenever CSS changes -->
  <link rel="stylesheet" href="style.css?v=svg-icons-3">
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loader-inner">
      <div class="loader-globe">&#127757;</div>
      <div class="loader-bar"><div class="loader-fill"></div></div>
      <div class="loader-text" data-i18n="loading">Loading MeteoGlobe...</div>
    </div>
  </div>

  <!-- 3D Globe: Cesium Viewer is mounted into this div by initMap() in app.js -->
  <div id="globe-container"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="app-logo">
      <span class="logo-icon">&#127757;</span>
      <span class="logo-text">MeteoGlobe</span>
    </div>

    <div class="search-box">
      <svg class="search-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="Search city or country..." autocomplete="off">
      <button class="search-clear" id="search-clear" style="display:none">x</button>
      <div id="search-results" class="search-dropdown"></div>
    </div>

    <div class="topbar-right">
      <span class="lang-toggle" id="lang-toggle" title="FR / EN">EN</span>
      <span class="unit-toggle" id="unit-toggle" title="Switch C / F">&deg;C</span>
    </div>
  </header>

  <!-- Weather panel -->
  <aside id="weather-panel">
    <button class="panel-close" id="close-panel" title="Close">x</button>

    <div class="panel-location">
      <div class="panel-city" id="loc-city">-</div>
      <div class="panel-country" id="loc-country"></div>
      <div class="panel-time" id="loc-time"></div>
    </div>

    <div class="panel-hero">
      <div class="hero-icon-wrap" id="hero-icon-wrap">
        <img id="hero-icon" src="" alt="Weather icon">
      </div>
      <div class="hero-right">
        <div class="hero-temp" id="hero-temp">-</div>
        <div class="hero-desc" id="hero-desc">-</div>
        <div class="hero-feels" id="hero-feels"></div>
      </div>
    </div>

    <div class="temp-chart-wrap">
      <canvas id="temp-chart"></canvas>
    </div>

    <div class="panel-forecast">
      <div class="forecast-header">
        <span class="forecast-title" data-i18n="forecast7day">7-Day Forecast</span>
        <span class="data-source" id="data-source"></span>
      </div>
      <div id="forecast-scroll" class="forecast-scroll"></div>
    </div>
  </aside>

  <!-- Globe controls -->
  <div class="controls glass-mini">
    <button class="ctrl-btn zoom-btn" id="btn-zoom-in" title="Zoom in">+
    </button>
    <button class="ctrl-btn zoom-btn" id="btn-zoom-out" title="Zoom out">-
    </button>
<button class="ctrl-btn" id="btn-home" title="Return to home view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-locate" title="Go to my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-refresh" title="Force refresh weather and markers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
  </div>

  <!-- Click hint -->
  <div class="hint" id="hint" data-i18n="clickHint">Click anywhere on the globe for weather</div>
  <div class="map-attrib" id="map-attrib">3D globe by CesiumJS | Esri World Imagery</div>

  <!-- Screensaver overlay (shown after ~60 s idle) -->
  <div id="screensaver" class="screensaver">
    <div class="ss-card">
      <div class="ss-logo">MeteoGlobe</div>
      <div class="ss-clock" id="ss-clock"></div>
      <div class="ss-hint" data-i18n="ssHint">Move mouse or touch to return</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="app.js?v=svg-icons-7"></script>
</body>
</html>
